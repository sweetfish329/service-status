<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        }
        main {
            flex: 1 0 auto;
            padding-top: 2rem;
        }
        .status-card {
            border-radius: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.4s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .status-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15) !important;
        }
        .status-badge {
            font-weight: bold;
            border-radius: 4px;
            padding: 4px 8px;
            color: white;
            display: inline-block;
            font-size: 0.85rem;
        }
        .online { background-color: #4caf50; }
        .offline { background-color: #f44336; }
        .ping {
            font-size: 0.85rem;
            color: #757575;
            margin-top: 4px;
        }
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }
    </style>
</head>
<body>
    <nav class="grey darken-4">
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo" style="font-weight: bold; letter-spacing: 1px;">STATUS</a>
        </div>
    </nav>

    <main class="container" x-data="statusApp()" x-init="fetchStatuses()">

        <template x-if="loading">
            <div class="loader-container">
                <div class="preloader-wrapper big active">
                    <div class="spinner-layer spinner-blue-only">
                        <div class="circle-clipper left"><div class="circle"></div></div>
                        <div class="gap-patch"><div class="circle"></div></div>
                        <div class="circle-clipper right"><div class="circle"></div></div>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="error">
            <div class="card-panel red lighten-4 red-text text-darken-4">
                <span x-text="error"></span>
            </div>
        </template>

        <div class="row" x-show="!loading && !error" style="display: none;">
            <template x-for="(server, index) in servers" :key="index">
                <div class="col s12 m6 l4" :style="`animation-delay: ${index * 0.05}s`">
                    <div class="card status-card z-depth-1">
                        <div class="card-content">
                            <span class="card-title" style="font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center;">
                                <span x-text="server.name"></span>
                                <span class="status-badge" :class="server.status === 'online' ? 'online' : 'offline'" x-text="server.status.toUpperCase()"></span>
                            </span>
                            <div style="margin-top: 1rem;">
                                <p class="grey-text text-darken-2" style="font-size: 0.9rem;">
                                    Type: <span x-text="server.type"></span>
                                </p>
                                <p class="grey-text text-darken-2 truncate" style="font-size: 0.9rem;" x-show="server.detail">
                                    Info: <span x-text="server.detail"></span>
                                </p>
                                <p class="ping" x-show="server.status === 'online'">
                                    Ping: <span x-text="server.ping"></span>ms
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

    </main>

    <footer class="page-footer grey darken-4" style="padding-top: 0; margin-top: auto;">
        <div class="footer-copyright">
            <div class="container center-align grey-text text-darken-1">
                Minimal Status Page
            </div>
        </div>
    </footer>

    <script>
        function statusApp() {
            return {
                servers: [],
                loading: true,
                error: null,
                async fetchStatuses() {
                    this.loading = true;
                    this.error = null;
                    try {
                        const response = await fetch('/api/status');
                        if (!response.ok) {
                            throw new Error('Failed to fetch status data');
                        }
                        this.servers = await response.json();
                    } catch (err) {
                        this.error = err.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
